name: Docker Image
on:
  push:
    tags:
      - v*
jobs:
  build-and-push:
    runs-on: codeberg-small
    steps:
      - uses: actions/checkout@v4
      - name: Install buildah
        run: apt-get update -qq && apt-get install -y -qq buildah ca-certificates
      - name: Build image
        env:
          STORAGE_DRIVER: vfs
          BUILDAH_ISOLATION: chroot
        run: |
          REGISTRY="codeberg.org/${{ github.repository }}"
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          buildah --storage-driver="$STORAGE_DRIVER" \
            bud --isolation="$BUILDAH_ISOLATION" \
            -t "${REGISTRY}:${VERSION}" \
            -t "${REGISTRY}:${MAJOR_MINOR}" \
            -t "${REGISTRY}:latest" \
            .
      - name: Push image
        env:
          STORAGE_DRIVER: vfs
        run: |
          REGISTRY="codeberg.org/${{ github.repository }}"
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          buildah --storage-driver="$STORAGE_DRIVER" push \
            --creds "${{ github.repository_owner }}:${{ secrets.REGISTRY_TOKEN }}" \
            "${REGISTRY}:${VERSION}"
          buildah --storage-driver="$STORAGE_DRIVER" push \
            --creds "${{ github.repository_owner }}:${{ secrets.REGISTRY_TOKEN }}" \
            "${REGISTRY}:${MAJOR_MINOR}"
          buildah --storage-driver="$STORAGE_DRIVER" push \
            --creds "${{ github.repository_owner }}:${{ secrets.REGISTRY_TOKEN }}" \
            "${REGISTRY}:latest"
