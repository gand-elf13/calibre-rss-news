name: Docker Image

on:
  push:
    tags:
      - v*

jobs:
  build-and-push:
    runs-on: codeberg-small
    env:
      STORAGE_DRIVER: vfs
      BUILDAH_ISOLATION: chroot
    steps:
      - uses: actions/checkout@v4

      - name: Install buildah
        run: |
          apt-get update -qq
          apt-get install -y -qq buildah ca-certificates

      - name: Login to Codeberg Container Registry
        run: |
          buildah login -u "${{ github.repository_owner }}" \
            -p "${{ secrets.GITHUB_TOKEN }}" \
            codeberg.org

      - name: Build and tag
        run: |
          REGISTRY="codeberg.org/${{ github.repository }}"
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          buildah --storage-driver="$STORAGE_DRIVER" \
            bud --isolation="$BUILDAH_ISOLATION" \
            -t "${REGISTRY}:${VERSION}" .
          buildah --storage-driver="$STORAGE_DRIVER" tag "${REGISTRY}:${VERSION}" "${REGISTRY}:${MAJOR_MINOR}"
          buildah --storage-driver="$STORAGE_DRIVER" tag "${REGISTRY}:${VERSION}" "${REGISTRY}:latest"
      - name: Push to registry
        run: |
          REGISTRY="codeberg.org/${{ github.repository }}"
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          buildah --storage-driver="$STORAGE_DRIVER" push "${REGISTRY}:${VERSION}"
          buildah --storage-driver="$STORAGE_DRIVER" push "${REGISTRY}:${MAJOR_MINOR}"
          buildah --storage-driver="$STORAGE_DRIVER" push "${REGISTRY}:latest"
